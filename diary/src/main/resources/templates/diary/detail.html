<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Diary Detail</title>
    <link rel="stylesheet" th:href="@{/css/main.css}" />
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/sweetalert2@11.4.10/dist/sweetalert2.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.4.10/dist/sweetalert2.min.js"></script>
  </head>

  <body>
    <div th:replace="~{fragments/layout :: adminLayout(~{::section})}">
      <section>
        <div class="diary-container">
          <header class="diary-header detail-header">
  <div></div>

  <div class="header-right">
    <button type="button" class = "diaryMenu" id="btnList">목록</button>
    <button type="button" id="btnEdit">수정</button>
    <button type="button" id="btnDelete">삭제</button>
  </div>
</header>

          <article class="diary-detail-card">
            <div class="diary-detail-header">
              <h2 class="diary-detail-title" id="diaryTitle">
                오늘의 다이어리 제목
              </h2>

              <span class="diary-date" id="diaryCreatedAt">
                2026-06-11
              </span>
            </div>

            <div class="diary-meta">
              <span id="diaryWriter">작성자: 관리자</span>
              <span id="diaryMood">기분: 좋음</span>
            </div>

            <hr class="diary-divider" />

            <div class="diary-detail-content" id="diaryContent">
              오늘 작성한 다이어리 내용이 여기에 표시됩니다.
              <br /><br />
              여러 줄의 내용도 자연스럽게 표시될 수 있도록 구성했습니다.
            </div>
          </article>



<section class="ai-analysis-card">
  <div class="ai-analysis-header">
    <div>
      <p class="ai-label">AI Emotion Analysis</p>
      <h3>AI 감정 분석</h3>
    </div>

    <button type="button" id="btnAnalyzeEmotion" class="btn-ai">
      분석하기
    </button>
  </div>

  <div class="ai-analysis-body">
    <div class="emotion-summary">
      <div class="emotion-icon">😊</div>

      <div>
        <p class="emotion-title" id="emotionTitle">아직 분석 전입니다</p>
        <p class="emotion-desc" id="emotionDesc">
          다이어리 내용을 기반으로 오늘의 감정 상태를 분석해드릴게요.
        </p>
      </div>
    </div>

    <div class="emotion-tags" id="emotionTags">
      <span>기대감</span>
      <span>차분함</span>
      <span>피로감</span>
    </div>

    <div class="ai-comment-box">
      <p class="ai-comment-title">AI 코멘트</p>
      <p id="aiComment">
        분석 버튼을 누르면 감정 요약과 짧은 피드백이 여기에 표시됩니다.
      </p>
    </div>
  </div>
</section>
        </div>

        <script th:src="@{/javascript/detail.js}"></script>
      </section>
    </div>
  </body>
</html>
